// --- SPRITE LOADER ---
const SPRITES = {};
let imageErrors = 0;

function loadSprites(done){
  const files = {
    archer:"archer.png",
    knight:"knight.png",
    gunner:"gunner.png",
    mage:"mage.png",
    dragon:"dragon.png",
    goblin:"goblin.png",
    orc:"orc.png",
    troll:"troll.png",
    enemy_dragon:"enemy_dragon.png"
  };

  let loaded = 0;
  const total = Object.keys(files).length;

  for(let k in files){
    const img = new Image();
    img.onload = ()=>{
      SPRITES[k] = img;
      loaded++;
      if(loaded === total) done();
    };
    img.onerror = ()=>{
      imageErrors++;
      SPRITES[k] = img; 
      loaded++;
      if(loaded === total) done();
    };
    img.src = files[k];
  }
}

// --- AUDIO ENGINE ---
let audioCtx;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

function playTone(freq, duration, type = 'square', volume = 0.15) {
    if(!audioCtx) return;
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
}

function rng(seed, n) {

}

function pxDraw(cCtx, spriteArr, pal, ox, oy, scale, flip = false) {
    for (let r = 0; r < spriteArr.length; r++) {
        for (let c = 0; c < spriteArr[r].length; c++) {
            let char = spriteArr[r][c];
            if (char !== '.') {
                cCtx.fillStyle = pal[char];
                let pxX = flip ? (spriteArr[r].length - 1 - c) : c;
                cCtx.fillRect(ox + pxX * scale, oy + r * scale, scale, scale);
            }
        }
    }
}

// --- INIT & SETUP ---
function init() {
    canvasWrap = document.getElementById('canvas-wrap');
    canvas = document.getElementById('gc');
    ctx = canvas.getContext('2d', { alpha: false });
    
    pathPx = PATH_DEF.map(p => ({ x: (p.c + 0.5) * TW, y: (p.r + 0.5) * TH }));
    
    setupUI();
    setupJoysticks();
    
    window.addEventListener('resize', resize);
    resize();
    
    // Bind canvas input (Mouse/Touch translated to world coords)
    canvas.addEventListener('click', onCanvasClick);
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;
        const wx = (screenX / cam.z) + cam.x;
        const wy = (screenY / cam.z) + cam.y;
        
        hoverGrid = { c: Math.floor(wx / TW), r: Math.floor(wy / TH) };
        updateTooltip(e.clientX, e.clientY);
    });
    canvas.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; hoverGrid = null; });
    
    document.addEventListener('keydown', e => {
        if(e.key >= '1' && e.key <= '5') {
            const keys = Object.keys(SOLDIERS);
            selectType(keys[e.key - 1]);
        }
        if(e.key === 'Escape') closeUpgradePanel();
        if(e.key === ' ' || e.key === 'Enter') {
            const btn = document.getElementById('wave-btn');
            if(!btn.disabled) sendWave();
        }
    });

    resetGame();
}

function resize() {
    CW = canvasWrap.clientWidth;
    CH = canvasWrap.clientHeight;
    canvas.width = CW;
    canvas.height = CH;
    
    cam.z = Math.max(0.6, Math.min(CW / WORLD_W, CH / WORLD_H) * 1.5);
    clampCamera();
}

function setupJoysticks() {
    const panZone = document.getElementById('joy-pan');
    const zoomZone = document.getElementById('joy-zoom');
    const kPan = document.getElementById('knob-pan');
    const kZoom = document.getElementById('knob-zoom');
    const maxR = 25; 

    function handlePointer(e, state, knobElem, isZoom) {
        e.preventDefault();
        const rect = e.target.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        
        let dx = e.clientX - cx;
        let dy = e.clientY - cy;
        
        if (isZoom) dx = 0;
        
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > maxR) {
            dx = (dx / dist) * maxR;
            dy = (dy / dist) * maxR;
        }
        
        state.dx = dx;
        state.dy = dy;
        knobElem.style.transform = `translate(${dx}px, ${dy}px)`;
    }

    panZone.addEventListener('pointerdown', e => { joyPan.active = true; joyPan.id = e.pointerId; panZone.setPointerCapture(e.pointerId); handlePointer(e, joyPan, kPan, false); });
    panZone.addEventListener('pointermove', e => { if (joyPan.active && e.pointerId === joyPan.id) handlePointer(e, joyPan, kPan, false); });
    const endPan = e => { if (e.pointerId === joyPan.id) { joyPan.active = false; joyPan.dx = 0; joyPan.dy = 0; kPan.style.transform = `translate(0px, 0px)`; panZone.releasePointerCapture(e.pointerId); }};
    panZone.addEventListener('pointerup', endPan); panZone.addEventListener('pointercancel', endPan);

    zoomZone.addEventListener('pointerdown', e => { joyZoom.active = true; joyZoom.id = e.pointerId; zoomZone.setPointerCapture(e.pointerId); handlePointer(e, joyZoom, kZoom, true); });
    zoomZone.addEventListener('pointermove', e => { if (joyZoom.active && e.pointerId === joyZoom.id) handlePointer(e, joyZoom, kZoom, true); });
    const endZoom = e => { if (e.pointerId === joyZoom.id) { joyZoom.active = false; joyZoom.dy = 0; kZoom.style.transform = `translate(0px, 0px)`; zoomZone.releasePointerCapture(e.pointerId); }};
    zoomZone.addEventListener('pointerup', endZoom); zoomZone.addEventListener('pointercancel', endZoom);
}

function setupUI() {
    const bar = document.getElementById('soldier-bar');
    bar.innerHTML = '';
    let i = 1;
    for (const [key, def] of Object.entries(SOLDIERS)) {
        const btn = document.createElement('div');
        btn.className = `soldier-btn ${key === selectedType ? 'selected' : ''}`;
        btn.onclick = () => selectType(key);
        btn.id = `btn-${key}`;
        
        const photoDiv = document.createElement('div');
        photoDiv.className = 'photo-frame';
        const cvs = document.createElement('canvas');
        cvs.width = 48; cvs.height = 48;
        const cCtx = cvs.getContext('2d');
        
        // Scenic Background
        let grd = cCtx.createLinearGradient(0,0,0,48);
        grd.addColorStop(0, '#5BA3D0'); grd.addColorStop(1, '#A8D4A0');
        cCtx.fillStyle = grd; cCtx.fillRect(0,0,48,48); 
        cCtx.fillStyle = '#357A28'; cCtx.fillRect(0, 32, 48, 16); 
        cCtx.fillStyle = '#2A6020'; cCtx.fillRect(10, 34, 15, 5); 
        
        const img = SPRITES[key];
        if(img && img.naturalWidth > 0){
            // Smart width logic: if image is square, it's 1 frame. If long, it's a sprite sheet.
            const fw = img.naturalWidth >= img.naturalHeight * 1.5 ? img.naturalWidth / 4 : img.naturalWidth;
            const fh = img.naturalHeight;
            const scale = Math.min(36/fw, 36/fh);
            const sw = fw * scale;
            const sh = fh * scale;
            cCtx.drawImage(img, 0, 0, fw, fh, 24 - sw/2, 24 - sh/2 + 4, sw, sh);
        } else {
            // Android Blocked Images Fallback -> draw pixel art
            pxDraw(cCtx, def.s, def.p, 24 - (def.s[0].length*3)/2, 24 - (def.s.length*3)/2 + 2, 3);
        }
        
        photoDiv.appendChild(cvs);
        btn.appendChild(photoDiv);
        btn.innerHTML += `<div class="btn-name">${def.name}</div><div class="btn-cost">${def.cost}g</div><div class="btn-key">${i++}</div>`;
        bar.appendChild(btn);
    }
}

function resetGame() {
    gold = 150; lives = 20; score = 0; currentWave = 0; waveActive = false;
    soldiers = []; enemies = []; projectiles = []; particles = []; spawnQueue = [];
    gameFrame = 0;
    
    grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
    PATH_DEF.forEach((p, i) => grid[p.r][p.c] = i === PATH_DEF.length - 1 ? 'tower' : 'path');
    
    closeUpgradePanel();
    document.getElementById('overlay').style.display = 'none';
    buildDecorations();
    updateHUD();
    msg("Tap green tiles to place soldiers — drag map to explore");
    
    cam.x = 0;
    cam.y = 0;
    clampCamera();
    
    if (loopId) cancelAnimationFrame(loopId);
    lastTime = performance.now();
    gameLoop(lastTime);
}

function buildDecorations() {
    if(!grid) return;
    decorations = [];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c]) continue;
            let rand = rng(r * 97 + c * 31, 1);
            if (rand < 0.22) decorations.push({ t: 'tree', c, r, ox: rng(r,c,2)*16-8, oy: rng(c,r,3)*16-8 });
            else if (rand < 0.32) decorations.push({ t: 'rock', c, r, ox: rng(r,c,4)*12-6, oy: rng(c,r,5)*12-6 });
        }
    }
}

// --- GAME LOOP ---
function clampCamera() {
    const viewW = CW / cam.z;
    const viewH = CH / cam.z;
    const maxCamX = Math.max(0, WORLD_W - viewW);
    const maxCamY = Math.max(0, WORLD_H - viewH);
    cam.x = Math.max(0, Math.min(cam.x, maxCamX));
    cam.y = Math.max(0, Math.min(cam.y, maxCamY));
}

function gameLoop(timestamp) {
    const dt = Math.min(timestamp - lastTime, 50);
    lastTime = timestamp;
    gameFrame++;
    
    update(dt);
    draw();
    
    loopId = requestAnimationFrame(gameLoop);
}

function update(dt) {
    if (joyPan.active) {
        cam.x += (joyPan.dx / 25) * 10;
        cam.y += (joyPan.dy / 25) * 10;
    }
    if (joyZoom.active) {
        cam.z -= (joyZoom.dy / 25) * 0.05;
        cam.z = Math.max(0.4, Math.min(cam.z, 3.5));
    }
    if (joyPan.active || joyZoom.active) clampCamera();

    if (waveActive && spawnQueue.length > 0) {
        spawnTimer++;
        if (spawnTimer >= spawnQueue[0].at) {
            const def = spawnQueue.shift();
            const speedPx = def.spd * (TW / 55);
            enemies.push({
                type: def.t, hp: def.hp, maxHp: def.hp, speed: speedPx, reward: def.rew,
                x: pathPx[0].x - TW, y: pathPx[0].y, waypointIndex: 0, dead: false,
                animFrame: 0, animTimer: 0, frames: 2, flash: 0
            });
        }
    }
    
    enemies.forEach(e => {
        e.animTimer++;
        if(e.animTimer >= 12){
            e.animFrame = (e.animFrame + 1) % e.frames;
            e.animTimer = 0;
        }
    });
    
    soldiers.forEach(s => {
        s.animTimer++;
        if(s.animTimer >= s.animSpeed){
            s.animFrame = (s.animFrame + 1) % s.frames;
            s.animTimer = 0;
        }

        if (s.cooldown > 0) s.cooldown--;
        
        // Attack Sync
        if(s.animFrame === 2 && s.cooldown <= 0){
            const rangePx = s.rng * TW;
            let target = null, maxProg = -1;
            
            enemies.forEach(e => {
                const dx = e.x - ((s.c + 0.5) * TW);
                const dy = e.y - ((s.r + 0.5) * TH);
                if (Math.sqrt(dx*dx + dy*dy) <= rangePx) {
                    const nextWp = pathPx[e.waypointIndex + 1];
                    const distToNext = nextWp ? Math.sqrt((nextWp.x-e.x)**2 + (nextWp.y-e.y)**2) : 0;
                    const prog = e.waypointIndex * 1000 + (1000 - distToNext);
                    if (prog > maxProg) { maxProg = prog; target = e; }
                }
            });
            
            if (target) {
                s.cooldown = s.rate;
                SFX[SOLDIERS[s.type].proj === 'arrow' ? 'arrow' : 'shoot']();
                projectiles.push({
                    type: SOLDIERS[s.type].proj,
                    sx: (s.c + 0.5) * TW, sy: (s.r + 0.5) * TH - TH*0.2,
                    target: target, t: 0, dmg: s.dmg
                });
            }
        }
    });

    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.flash > 0) e.flash--;
        
        const nextWp = pathPx[e.waypointIndex + 1];
        if (!nextWp) {
            lives--;
            SFX.hurt();
            updateHUD();
            enemies.splice(i, 1);
            if (lives <= 0) gameOver(false);
            continue;
        }
        
        const dx = nextWp.x - e.x;
        const dy = nextWp.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < e.speed) {
            e.x = nextWp.x; e.y = nextWp.y;
            e.waypointIndex++;
        } else {
            e.x += (dx/dist) * e.speed;
            e.y += (dy/dist) * e.speed;
        }
    }
    
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.t += 0.1;
        
        if (p.t >= 1) {
            if (!p.target.dead) {
                p.target.hp -= p.dmg;
                p.target.flash = 6;
                spawnParticles(p.target.x, p.target.y, 3, p.type === 'fire' ? '#FF5500' : '#FFF', false);
                
                if (p.target.hp <= 0) {
                    p.target.dead = true;
                    gold += p.target.reward;
                    score += p.target.reward * currentWave;
                    SFX.kill();
                    spawnParticles(p.target.x, p.target.y, 8, p.target.type === 'goblin' ? '#2E8B2E' : '#8B0000', false);
                    spawnParticles(p.target.x, p.target.y - 15, 1, '#F5C400', true, `+${p.target.reward}g`);
                    updateHUD();
                    enemies.splice(enemies.indexOf(p.target), 1);
                }
            }
            projectiles.splice(i, 1);
        }
    }
    
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life--;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.vy_grav;
        if (p.life <= 0) particles.splice(i, 1);
    }
    
    checkWave();
    
    Object.keys(SOLDIERS).forEach(k => {
        const btn = document.getElementById(`btn-${k}`);
        if(gold < SOLDIERS[k].cost) btn.classList.add('disabled');
        else btn.classList.remove('disabled');
    });
}

function checkWave() {
    if (waveActive && spawnQueue.length === 0 && enemies.length === 0) {
        waveActive = false;
        const bonus = 30 + currentWave * 10;
        gold += bonus;
        score += bonus;
        updateHUD();
        SFX.win();
        msg(`Wave ${currentWave} cleared! +${bonus}g bonus!`);
        
        const btn = document.getElementById('wave-btn');
        if (currentWave >= 12) {
            gameOver(true);
        } else {
            btn.disabled = false;
            btn.innerText = `⚔️ Send Wave ${currentWave + 1}`;
        }
    }
}

function spawnParticles(x, y, count, color, isText, textStr = "") {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = isText ? 0 : 1 + Math.random() * 4;
        particles.push({
            x, y,
            vx: isText ? (Math.random() - 0.5) * 1.5 : Math.cos(angle) * speed,
            vy: isText ? -3 : Math.sin(angle) * speed,
            vy_grav: isText ? 0 : 0.15,
            life: isText ? 50 : 28, maxLife: isText ? 50 : 28,
            color, isText, text: textStr,
            size: 2 + Math.random() * 3
        });
    }
}

// --- DRAWING ---
function draw() {
    const grad = ctx.createLinearGradient(0, 0, 0, CH);
    grad.addColorStop(0, '#5BA3D0');
    grad.addColorStop(0.6, '#A8D4A0');
    grad.addColorStop(1, '#7AB068');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CW, CH);
    
    ctx.save();
    ctx.scale(cam.z, cam.z);
    ctx.translate(-cam.x, -cam.y);
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = c * TW, y = r * TH;
            const t = grid[r][c];
            if (t === 'path') drawPath(c, r, x, y);
            else if (t === 'tower') drawTower(x, y);
            else drawGrass(c, r, x, y);
        }
    }
    
    if (hoverGrid && !grid[hoverGrid.r][hoverGrid.c] && !waveActive && hoverGrid.c >= 0 && hoverGrid.c < COLS && hoverGrid.r >= 0 && hoverGrid.r < ROWS) {
        ctx.fillStyle = 'rgba(100,255,80,0.25)';
        ctx.fillRect(hoverGrid.c * TW, hoverGrid.r * TH, TW, TH);
        ctx.strokeStyle = 'rgba(100,255,80,0.8)';
        ctx.lineWidth = 2;
        ctx.strokeRect(hoverGrid.c * TW, hoverGrid.r * TH, TW, TH);
    }
    
    decorations.forEach(d => {
        const x = d.c * TW + TW/2 + d.ox, y = d.r * TH + TH/2 + d.oy;
        const sz = Math.max(2, Math.floor(TW/15));
        if (d.t === 'tree') {
            ctx.fillStyle = '#1A5C1A'; ctx.fillRect(x-sz*2, y-sz*4, sz*4, sz*6);
            ctx.fillStyle = '#2A8C2A'; ctx.fillRect(x-sz*3, y-sz*6, sz*6, sz*5);
            ctx.fillStyle = '#3AAC3A'; ctx.fillRect(x-sz*2, y-sz*8, sz*4, sz*4);
            ctx.fillStyle = '#5ACC5A'; ctx.fillRect(x-sz, y-sz*10, sz*2, sz*3);
            ctx.fillStyle = '#8B5A2B'; ctx.fillRect(x-sz/2, y, sz, sz*3); 
        } else {
            ctx.fillStyle = '#7A7060'; ctx.fillRect(x-sz*3, y, sz*6, sz*3);
            ctx.fillStyle = '#9A9080'; ctx.fillRect(x-sz*2, y, sz*2, sz);
            ctx.fillStyle = '#5A5040'; ctx.fillRect(x+sz, y+sz*2, sz*2, sz);
        }
    });
    
    if (gameFrame % 60 < 30) {
        ctx.fillStyle = '#FFDD00';
        ctx.font = `bold ${TH*0.6}px sans-serif`;
        ctx.fillText('→', pathPx[0].x - TW*0.9, pathPx[0].y + TH*0.2);
    }
    
    if (selectedSoldier) {
        ctx.beginPath();
        ctx.arc((selectedSoldier.c+0.5)*TW, (selectedSoldier.r+0.5)*TH, selectedSoldier.rng*TW, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
        ctx.setLineDash([8, 8]);
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255, 215, 0, 0.05)';
        ctx.fill();
    }
    
    // SOLDIERS
    soldiers.forEach(s => {
        const x = s.c * TW, y = s.r * TH;
        const sx = x + TW/2;
        const sy = y + TH/2;
        let yOff = s.attackAnim > 0 ? -6 : Math.sin(gameFrame * 0.04 + s.c * 1.3) * 1.8;
        
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath();
        ctx.ellipse(sx, y + TH*0.85, TW*0.3, TH*0.12, 0, 0, Math.PI*2);
        ctx.fill();

        const img = SPRITES[s.type];
        if(img && img.naturalWidth > 0){
            // Auto detect if it's a sprite sheet or a single square image
            const fw = img.naturalWidth >= img.naturalHeight * 1.5 ? img.naturalWidth / s.frames : img.naturalWidth;
            const fh = img.naturalHeight;
            const actFrame = (fw === img.naturalWidth) ? 0 : s.animFrame;

            ctx.drawImage(
                img,
                actFrame * fw, 0, fw, fh,
                sx - fw/2,
                sy - fh/2,
                fw,
                fh
            );
        } else {
            // Android Blocked Images Fallback -> draw pixel art
            const def = SOLDIERS[s.type];
            const sc = Math.max(1, Math.floor(Math.min(TW, TH) / 13));
            pxDraw(ctx, def.s, def.p, sx - (def.s[0].length*sc)/2, sy - (def.s.length*sc)/2 + yOff, sc);
        }
        
        const lvl = 1 + s.upgDmg + s.upgSpd + s.upgRng;
        if (lvl > 1) {
            ctx.fillStyle = '#FFD700';
            ctx.font = `bold ${Math.max(10, TW*0.22)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText(`★${lvl}`, sx, y + TH*0.15);
            ctx.textAlign = 'left';
        }
    });
    
    // PROJECTILES
    projectiles.forEach(p => {
        const cx = lerp(p.sx, p.target.x, p.t);
        const cy = lerp(p.sy, p.target.y, p.t) - Math.sin(p.t * Math.PI) * TH * 0.6;
        
        if (p.type === 'arrow') {
            ctx.fillStyle = '#AAFF60';
            ctx.save(); ctx.translate(cx, cy);
            ctx.rotate(Math.atan2(p.target.y - p.sy, p.target.x - p.sx));
            ctx.fillRect(-8, -2, 16, 3);
            ctx.restore();
        } else if (p.type === 'axe') {
            ctx.fillStyle = '#8888FF';
            ctx.save(); ctx.translate(cx, cy);
            ctx.rotate(gameFrame * 0.35);
            ctx.fillRect(-7, -7, 14, 14);
            ctx.restore();
        } else if (p.type === 'bullet') {
            ctx.fillStyle = 'rgba(255,221,0,0.4)'; ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFDD00'; ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
        } else if (p.type === 'spell') {
            const r = 8 + Math.sin(gameFrame*0.3)*3;
            ctx.fillStyle = '#EE40FF'; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(cx, cy, r/2, 0, Math.PI*2); ctx.fill();
        } else if (p.type === 'fire') {
            ctx.fillStyle = 'rgba(255,85,0,0.6)'; ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FF5500'; ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI*2); ctx.fill();
        }
    });
    
    // ENEMIES
    enemies.forEach(e => {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath(); ctx.ellipse(e.x, e.y + TH*0.3, TW*0.4, TH*0.15, 0, 0, Math.PI*2); ctx.fill();

        const key = e.type === "dragon" ? "enemy_dragon" : e.type;
        const img = SPRITES[key];

        if(img && img.naturalWidth > 0){
            const fw = img.naturalWidth >= img.naturalHeight * 1.5 ? img.naturalWidth / e.frames : img.naturalWidth;
            const fh = img.naturalHeight;
            const actFrame = (fw === img.naturalWidth) ? 0 : e.animFrame;
            const flip = (pathPx[e.waypointIndex+1] && pathPx[e.waypointIndex+1].x < e.x);

            ctx.save();
            if(flip){
                ctx.scale(-1,1);
                ctx.drawImage(
                    img,
                    actFrame * fw, 0, fw, fh,
                    -e.x - fw/2,
                    e.y - fh/2,
                    fw,
                    fh
                );
            } else {
                ctx.drawImage(
                    img,
                    actFrame * fw, 0, fw, fh,
                    e.x - fw/2,
                    e.y - fh/2,
                    fw,
                    fh
                );
            }
            ctx.restore();

            if(e.flash > 0){
                ctx.globalAlpha = 0.4;
                ctx.fillStyle = "white";
                ctx.fillRect(e.x - fw/2, e.y - fh/2, fw, fh);
                ctx.globalAlpha = 1;
            }
        } else {
            // Android Blocked Images Fallback -> draw pixel art
            const def = ENEMIES[e.type];
            const sc = Math.max(1, Math.floor(Math.min(TW, TH) / 13)) * (def.sc / 1.8);
            const fi = Math.floor(gameFrame / 8) % 2;
            const arr = def.f[fi];
            const flip = (pathPx[e.waypointIndex+1] && pathPx[e.waypointIndex+1].x < e.x);
            
            ctx.globalAlpha = e.flash > 0 ? 0.4 : 1.0;
            pxDraw(ctx, arr, def.p, e.x - (arr[0].length*sc)/2, e.y - (arr.length*sc)/2, sc, flip);
            ctx.globalAlpha = 1.0;
        }
        
        const bw = 30, bh = 5;
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(e.x - bw/2, e.y - 25, bw, bh);
        const hpPct = Math.max(0, e.hp / e.maxHp);
        ctx.fillStyle = hpPct > 0.6 ? '#44CC44' : (hpPct > 0.3 ? '#FFAA00' : '#FF3333');
        ctx.fillRect(e.x - bw/2, e.y - 25, bw * hpPct, bh);
    });
    
    particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;
        if (p.isText) {
            ctx.font = 'bold 16px Cinzel';
            ctx.textAlign = 'center';
            ctx.fillText(p.text, p.x, p.y);
            ctx.textAlign = 'left';
        } else {
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        }
    });
    ctx.globalAlpha = 1.0;
    
    ctx.restore(); 
    
    // UI Warnings & Banners
    if (imageErrors > 0) {
        ctx.fillStyle = 'rgba(220, 0, 0, 0.85)';
        ctx.fillRect(0, 4, CW, 50);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`⚠️ Android Blocked Images (${imageErrors} failed)`, CW/2, 22);
        ctx.font = '12px sans-serif';
        ctx.fillText(`Open via Local Web Server app, NOT File Manager`, CW/2, 40);
        ctx.textAlign = 'left';
    }

    if (waveActive && enemies.length > 0 && enemies.length <= 3 && spawnQueue.length === 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, imageErrors > 0 ? 54 : 0, CW, 30);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 14px Cinzel';
        ctx.textAlign = 'center';
        ctx.fillText(`${enemies.length} enemies remaining!`, CW/2, imageErrors > 0 ? 74 : 20);
        ctx.textAlign = 'left';
    }
}

function drawGrass(c, r, x, y) {
    ctx.fillStyle = '#357A28'; ctx.fillRect(x, y, TW, TH);
    ctx.fillStyle = '#2A6020';
    ctx.fillRect(x + rng(r*97+c, 1)*TW*0.5, y + rng(c*31+r, 2)*TH*0.5, TW*0.3, TH*0.2);
    ctx.fillStyle = '#4A9A38';
    ctx.fillRect(x + TW*0.2, y + TH*0.3, 3, 4);
    ctx.fillRect(x + TW*0.7, y + TH*0.6, 3, 3);
    
    const fl = rng(r*13+c, 3);
    if (fl < 0.12) { ctx.fillStyle = '#FFD700'; ctx.fillRect(x+TW*0.8, y+TH*0.2, 3, 3); }
    else if (fl < 0.20) { ctx.fillStyle = '#FF88AA'; ctx.fillRect(x+TW*0.4, y+TH*0.8, 3, 3); }
}

function drawPath(c, r, x, y) {
    ctx.fillStyle = '#C09850'; ctx.fillRect(x, y, TW, TH);
    ctx.fillStyle = '#A07A3A';
    for(let i=0; i<5; i++) {
        ctx.fillRect(x + rng(r,i)*TW*0.6, y + (i/5)*TH, TW*0.4, 3);
    }
    ctx.fillStyle = '#D4B070'; ctx.fillRect(x, y, TW, 3); ctx.fillRect(x, y, 3, TH);
    ctx.fillStyle = '#906030'; ctx.fillRect(x, y+TH-3, TW, 3); ctx.fillRect(x+TW-3, y, 3, TH);
    if (rng(r*17+c, 4) < 0.3) { ctx.fillStyle = '#888070'; ctx.fillRect(x+TW*0.5, y+TH*0.5, 3, 3); }
}

function drawTower(x, y) {
    ctx.fillStyle = '#706858'; ctx.fillRect(x, y, TW, TH);
    ctx.fillStyle = '#908A78'; ctx.fillRect(x, y, TW*0.3, TH*0.2); ctx.fillRect(x+TW*0.7, y, TW*0.3, TH*0.2);
    ctx.fillStyle = '#504840'; ctx.fillRect(x, y+TH*0.4, TW, 3); ctx.fillRect(x, y+TH*0.7, TW, 3);
    ctx.fillStyle = '#200F00';
    ctx.beginPath(); ctx.arc(x+TW/2, y+TH, TW*0.3, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#8B5A2B'; ctx.fillRect(x+TW/2-1.5, y-TH*0.5, 3, TH*0.5); 
    ctx.fillStyle = '#CC1111'; ctx.fillRect(x+TW/2+1.5, y-TH*0.5, TW*0.4, TH*0.3); 
    ctx.fillStyle = '#FFDD00'; ctx.fillRect(x+TW/2+1.5, y-TH*0.35, TW*0.4, 3); 
}

// --- INTERACTION ---
function selectType(type) {
    selectedType = type;
    document.querySelectorAll('.soldier-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(`btn-${type}`).classList.add('selected');
    closeUpgradePanel();
}

function onCanvasClick(e) {
    getAudioCtx(); 
    const rect = canvas.getBoundingClientRect();
    const screenX = e.clientX - rect.left;
    const screenY = e.clientY - rect.top;
    
    const wx = (screenX / cam.z) + cam.x;
    const wy = (screenY / cam.z) + cam.y;
    
    const c = Math.floor(wx / TW);
    const r = Math.floor(wy / TH);
    
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
    
    const tile = grid[r][c];
    
    if (tile === 'soldier') {
        const s = soldiers.find(s => s.c === c && s.r === r);
        if (s) openUpgradePanel(s, e.clientX, e.clientY);
        return;
    }
    
    closeUpgradePanel();
    
    if (tile === 'path' || tile === 'tower') {
        msg("Can't place on the path!");
        SFX.error();
        return;
    }
    
    const def = SOLDIERS[selectedType];
    if (gold < def.cost) {
        msg(`Need ${def.cost}g — not enough gold!`);
        SFX.error();
        return;
    }
    
    gold -= def.cost;
    grid[r][c] = 'soldier';
    soldiers.push({
        type: selectedType, c, r, cooldown: 0,
        upgDmg: 0, upgSpd: 0, upgRng: 0,
        dmg: def.dmg, rate: def.rate, rng: def.range,
        animFrame: 0, animTimer: 0, animSpeed: 6, frames: 4
    });
    
    buildDecorations();
    updateHUD();
    SFX.place();
    spawnParticles((c+0.5)*TW, (r+0.5)*TH, 15, '#A07A3A', false);
    msg(`${def.name} placed! Tap to upgrade.`);
}

function sendWave() {
    getAudioCtx();
    if (waveActive || currentWave >= 12) return;
    
    currentWave++;
    waveActive = true;
    spawnTimer = 0;
    spawnQueue = [];
    
    const waveDef = WAVES[currentWave - 1];
    let timeAcc = 0;
    
    waveDef.forEach(group => {
        for(let i=0; i<group.n; i++) {
            timeAcc += group.gap;
            const hpMod = ENEMIES[group.t].hp * (1 + currentWave * 0.20);
            spawnQueue.push({ at: timeAcc, t: group.t, hp: hpMod, spd: ENEMIES[group.t].spd, rew: ENEMIES[group.t].rew });
        }
    });
    
    spawnQueue.sort((a,b) => a.at - b.at);
    
    updateHUD();
    const btn = document.getElementById('wave-btn');
    btn.disabled = true;
    btn.innerText = `Wave ${currentWave}/12 — Defend!`;
    msg(`Wave ${currentWave} incoming! Hold the line!`);
}

function openUpgradePanel(s, cx, cy) {
    selectedSoldier = s;
    const pnl = document.getElementById('upgrade-panel');
    const lvl = 1 + s.upgDmg + s.upgSpd + s.upgRng;
    const baseCost = 30;
    
    document.getElementById('upg-title').innerText = `${SOLDIERS[s.type].name} Lv${lvl}`;
    
    const dCost = baseCost + (lvl) * 22;
    const sCost = baseCost + (lvl) * 22;
    const rCost = baseCost + (lvl) * 22;
    const sellVal = Math.floor(SOLDIERS[s.type].cost * 0.5);
    
    document.getElementById('cost-dmg').innerText = `${dCost}g`;
    document.getElementById('cost-spd').innerText = `${sCost}g`;
    document.getElementById('cost-rng').innerText = `${rCost}g`;
    document.getElementById('cost-sell').innerText = `+${sellVal}g`;
    
    document.getElementById('btn-upg-dmg').disabled = gold < dCost;
    document.getElementById('btn-upg-spd').disabled = gold < sCost;
    document.getElementById('btn-upg-rng').disabled = gold < rCost;
    
    pnl.style.display = 'flex';
    const rect = canvasWrap.getBoundingClientRect();
    let px = cx - rect.left + 20;
    let py = cy - rect.top - 40;
    if (px + pnl.offsetWidth > rect.width) px = cx - rect.left - pnl.offsetWidth - 20;
    pnl.style.left = `${px}px`;
    pnl.style.top = `${py}px`;
}

function closeUpgradePanel() {
    selectedSoldier = null;
    document.getElementById('upgrade-panel').style.display = 'none';
}

function buyUpgrade(type) {
    if (!selectedSoldier) return;
    const s = selectedSoldier;
    const lvl = 1 + s.upgDmg + s.upgSpd + s.upgRng;
    const cost = 30 + lvl * 22;
    
    if (gold >= cost) {
        gold -= cost;
        if (type === 'dmg') { s.upgDmg++; s.dmg = SOLDIERS[s.type].dmg * (1 + s.upgDmg * 0.32); }
        if (type === 'spd') { s.upgSpd++; s.rate = SOLDIERS[s.type].rate * (1 - s.upgSpd * 0.12); }
        if (type === 'rng') { s.upgRng++; s.rng = SOLDIERS[s.type].range + s.upgRng * 0.65; }
        SFX.upgrade();
        updateHUD();
        openUpgradePanel(s, parseFloat(document.getElementById('upgrade-panel').style.left), parseFloat(document.getElementById('upgrade-panel').style.top));
        msg(`Upgraded ${SOLDIERS[s.type].name}!`);
        spawnParticles((s.c+0.5)*TW, (s.r+0.5)*TH, 20, '#F5C400', false);
    } else {
        SFX.error();
    }
}

function sellSoldier() {
    if (!selectedSoldier) return;
    const s = selectedSoldier;
    const val = Math.floor(SOLDIERS[s.type].cost * 0.5);
    gold += val;
    grid[s.r][s.c] = null;
    soldiers.splice(soldiers.indexOf(s), 1);
    buildDecorations();
    updateHUD();
    closeUpgradePanel();
    SFX.place();
    msg(`Sold for ${val}g`);
}

function updateTooltip(cx, cy) {
    const tt = document.getElementById('tooltip');
    if (!hoverGrid) { tt.style.display = 'none'; return; }
    
    const s = soldiers.find(s => s.c === hoverGrid.c && s.r === hoverGrid.r);
    if (s) {
        const lvl = 1 + s.upgDmg + s.upgSpd + s.upgRng;
        tt.innerHTML = `<b>${SOLDIERS[s.type].name} Lv${lvl}</b><br>Dmg: ${formatStat(s.dmg)}<br>Rng: ${formatStat(s.rng)}<br>Rate: ${formatStat(s.rate)}f`;
        tt.style.display = 'block';
        tt.style.left = `${cx + 15}px`;
        tt.style.top = `${cy + 15}px`;
    } else {
        tt.style.display = 'none';
    }
}

function updateHUD() {
    document.getElementById('val-gold').innerText = Math.floor(gold);
    document.getElementById('val-wave').innerText = `${currentWave}/12`;
    document.getElementById('val-lives').innerText = lives;
    document.getElementById('val-score').innerText = Math.floor(score);
}

function gameOver(win) {
    waveActive = false;
    cancelAnimationFrame(loopId);
    loopId = null;
    const over = document.getElementById('overlay');
    const title = document.getElementById('overlay-title');
    over.style.display = 'flex';
    
    if (win) {
        title.innerText = "Victory!";
        title.className = "win-title";
        document.getElementById('overlay-desc').innerText = `Final Score: ${Math.floor(score)} | The realm is safe!`;
        SFX.win();
    } else {
        title.innerText = "Kingdom Fallen";
        title.className = "lose-title";
        document.getElementById('overlay-desc').innerText = `Final Score: ${Math.floor(score)} | The monsters broke through.`;
        SFX.lose();
    }
}

window.onload = () => loadSprites(init);
</script>
